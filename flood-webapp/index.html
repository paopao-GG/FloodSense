<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flood Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Flood Monitor System</h1>
    <div id="status-banner" class="status-banner">
      <span id="status-text">CONNECTING...</span>
    </div>
    <p id="last-updated" class="last-updated">Last updated: —</p>
  </header>

  <main>
    <div class="sensor-grid">
      <div class="card">
        <div class="card-label">Water Level</div>
        <div class="card-value" id="water-level">—</div>
        <div class="card-unit">cm from sensor</div>
      </div>
      <div class="card">
        <div class="card-label">Temperature</div>
        <div class="card-value" id="temperature">—</div>
        <div class="card-unit">°C</div>
      </div>
      <div class="card">
        <div class="card-label">Humidity</div>
        <div class="card-value" id="humidity">—</div>
        <div class="card-unit">%</div>
      </div>
      <div class="card">
        <div class="card-label">CNN Confidence</div>
        <div class="card-value" id="cnn-confidence">—</div>
        <div class="card-unit">last detection</div>
      </div>
    </div>

    <section class="snapshot-section">
      <h2>Latest Snapshot</h2>
      <div id="latest-snapshot-container" class="snapshot-main">
        <p id="no-snapshot-msg" class="no-snapshot">No snapshot captured yet. Snapshots are taken when water level breaches the threshold.</p>
        <img id="latest-snapshot" src="" alt="Latest camera snapshot" class="snapshot-img hidden" />
      </div>

      <h2>Snapshot History <span class="history-count" id="history-count"></span></h2>
      <div id="snapshot-history" class="snapshot-gallery"></div>
    </section>
  </main>

  <!-- Lightbox overlay for full-size snapshot view -->
  <div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full size snapshot" />
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
